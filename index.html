<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Center Hub — AY 2026–27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efec;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  /* Michelle = green */
  --michelle:#1D9E75;--michelle-light:#E1F5EE;--michelle-dark:#085041;
  /* Matthew = blue */
  --matthew:#185FA5;--matthew-light:#E6F1FB;--matthew-dark:#0C447C;
  /* Carter = purple */
  --carter:#534AB7;--carter-light:#EEEDFE;--carter-dark:#3C3489;
  --amber:#BA7517;--amber-light:#FAEEDA;--amber-dark:#854F0B;
  --red:#A32D2D;--red-light:#FCEBEB;
  --green:#3B6D11;--green-light:#EAF3DE;
  --gray:#5F5E5A;--gray-light:#F1EFE8;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Inter',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.topbar h1{font-size:17px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.topbar h1 i{font-size:20px;color:var(--michelle)}
.who-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.who-label{font-size:12px;color:var(--text2)}
.who-btn{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;background:var(--bg);color:var(--text2);font-family:'Inter',sans-serif;transition:all .15s}
.who-btn:hover{background:var(--bg2)}
.who-btn.active-michelle{background:var(--michelle-light);color:var(--michelle-dark);border-color:var(--michelle)}
.who-btn.active-matthew{background:var(--matthew-light);color:var(--matthew-dark);border-color:var(--matthew)}
.who-btn.active-carter{background:var(--carter-light);color:var(--carter-dark);border-color:var(--carter)}
.status-bar{font-size:11px;color:var(--text3);background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:4px 10px;display:flex;align-items:center;gap:6px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.status-dot.ok{background:var(--michelle)}
.status-dot.err{background:var(--red)}
.status-dot.loading{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{display:flex;border-bottom:1px solid var(--border);gap:0;background:var(--bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:0 1rem;overflow-x:auto}
.tab{font-size:13px;padding:12px 16px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:color .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.panel{display:none;background:var(--bg);border-radius:0 0 var(--radius-lg) var(--radius-lg);padding:1.5rem;border:1px solid var(--border);border-top:none}
.panel.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:var(--bg2);border-radius:var(--radius);padding:.875rem;text-align:center}
.metric-num{font-size:24px;font-weight:600;color:var(--text)}
.metric-label{font-size:11px;color:var(--text2);margin-top:3px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.section-head h2{font-size:14px;font-weight:600;color:var(--text)}
.section-head p{font-size:12px;color:var(--text2);margin-top:2px}
.btn{font-size:12px;padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border2);cursor:pointer;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--michelle);color:#fff;border-color:var(--michelle)}
.btn-primary:hover{background:var(--michelle-dark)}
.btn-sm{font-size:11px;padding:3px 9px}
.btn-danger{color:var(--red);border-color:transparent;background:none}
.btn-danger:hover{background:var(--red-light)}
.btn-active{background:var(--michelle-light);color:var(--michelle-dark);border-color:var(--michelle)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.875rem 1rem;margin-bottom:8px;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.card.dimmed{opacity:.5}
.card-top{display:flex;align-items:flex-start;gap:10px}
.card-title{font-size:13px;font-weight:500;color:var(--text);flex:1;line-height:1.45}
.card-meta{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
.card-dates{display:flex;gap:12px;margin-top:5px;flex-wrap:wrap}
.card-date-group{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:8px}
.date-chip{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;white-space:nowrap}
.date-chip.overdue{color:var(--red);font-weight:500}
.date-chip.soon{color:var(--amber-dark);font-weight:500}
.date-chip-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.card-notes{font-size:12px;color:var(--text2);margin-top:7px;line-height:1.55;border-top:1px solid var(--border);padding-top:7px}
.card-actions{display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:400;white-space:nowrap}
/* Category badges */
.b-operations{background:#E6F1FB;color:#0C447C}
.b-programming{background:#EEEDFE;color:#3C3489}
.b-development{background:#E1F5EE;color:#085041}
/* Priority tag */
.priority-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:#FEF0E6;color:#E8630A;border:1px solid #E8630A;white-space:nowrap}
/* Status badges */
.b-todo{background:var(--gray-light);color:var(--gray)}
.b-inprog{background:var(--carter-light);color:var(--carter-dark)}
.b-done{background:var(--green-light);color:var(--green)}
.b-paused{background:var(--amber-light);color:var(--amber-dark)}
.b-dropped{background:var(--gray-light);color:var(--text3)}
/* Owner badges */
.b-michelle{background:var(--michelle-light);color:var(--michelle-dark)}
.b-matthew{background:var(--matthew-light);color:var(--matthew-dark)}
.b-carter{background:var(--carter-light);color:var(--carter-dark)}
.b-all{background:var(--gray-light);color:var(--gray)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dot-high{background:#E24B4A}
.dot-med{background:#EF9F27}
.dot-low{background:#639922}
.date-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-right:2px}
.due-tag{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.due-tag.overdue{color:var(--red)}
.due-tag.soon{color:var(--amber-dark)}
.tl-wrap{margin-bottom:1.5rem}
.tl-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px}
.tl-track{height:8px;background:var(--bg2);border-radius:4px;border:1px solid var(--border)}
.tl-fill{height:100%;background:var(--michelle);border-radius:4px;transition:width .4s}
.month-group{margin-bottom:1.5rem}
.month-header{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.month-count{font-size:11px;font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0}
.ms-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.ms-row:last-child{border-bottom:none}
.ms-date{font-size:12px;color:var(--text2);width:80px;flex-shrink:0}
.ms-icon{font-size:16px;flex-shrink:0}
.ms-title{font-size:13px;color:var(--text);flex:1;line-height:1.4}
.ms-title.past{color:var(--text3);text-decoration:line-through}
.log-entry{padding:10px 0;border-bottom:1px solid var(--border)}
.log-entry:last-child{border-bottom:none}
.log-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.log-author{font-size:12px;font-weight:500;color:var(--text)}
.log-text{font-size:13px;color:var(--text2);line-height:1.55}
.empty{font-size:13px;color:var(--text3);text-align:center;padding:2rem 0}
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.filters select{font-size:12px;padding:5px 8px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;cursor:pointer}
.view-toggle{display:flex;gap:4px;background:var(--bg2);border-radius:var(--radius);padding:3px}
.view-btn{font-size:11px;padding:3px 10px;border-radius:6px;border:none;cursor:pointer;background:none;color:var(--text2);font-family:'Inter',sans-serif;transition:all .15s}
.view-btn.active{background:var(--bg);color:var(--text);font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.divider{margin:1.5rem 0;border:none;border-top:1px solid var(--border)}
.mytasks-bar{border-radius:var(--radius);padding:7px 12px;margin-bottom:1rem;font-size:12px;display:flex;align-items:center;justify-content:space-between}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:flex-start;justify-content:center;padding-top:5vh;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border2);padding:1.5rem;width:100%;max-width:480px;margin:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1.25rem;color:var(--text)}
.field{margin-bottom:13px}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--michelle);border-color:var(--michelle)}
.field textarea{height:70px;resize:vertical;line-height:1.5}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;border-top:1px solid var(--border);padding-top:1rem}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--michelle);border-radius:50%;animation:spin .7s linear infinite}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
/* Calendar - Gantt style */
.cal-wrap{width:100%;overflow-x:auto}
.cal-header-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:2px solid var(--border)}
.cal-header-cell{font-size:11px;font-weight:600;color:var(--text2);text-align:center;padding:6px 0}
.cal-week-row{display:grid;grid-template-columns:repeat(7,1fr);position:relative;border-bottom:1px solid var(--border)}
.cal-week-row:last-child{border-bottom:none}
.cal-day-cell{border-right:1px solid var(--border);min-height:28px;position:relative}
.cal-day-cell:last-child{border-right:none}
.cal-day-num{font-size:10px;color:var(--text3);padding:2px 4px;line-height:1;position:relative;z-index:2}
.cal-day-num.is-today{background:var(--michelle);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;margin:2px}
.cal-day-cell.other-month{background:var(--bg2)}
.cal-bars-layer{position:relative;padding:0 0 4px 0}
.cal-gantt-bar{position:relative;height:18px;margin:1px 0;border-radius:3px;display:flex;align-items:center;font-size:10px;font-weight:600;padding:0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default;box-sizing:border-box}
.cal-gantt-bar.owner-michelle{background:var(--michelle-light);color:var(--michelle-dark);border-left:3px solid var(--michelle)}
.cal-gantt-bar.owner-matthew{background:var(--matthew-light);color:var(--matthew-dark);border-left:3px solid var(--matthew)}
.cal-gantt-bar.owner-carter{background:var(--carter-light);color:var(--carter-dark);border-left:3px solid var(--carter)}
.cal-gantt-bar.owner-all{background:var(--gray-light);color:var(--gray);border-left:3px solid var(--gray)}
.cal-gantt-bar.continues-left{border-left:none;border-radius:0 3px 3px 0}
.cal-gantt-bar.continues-right{border-radius:3px 0 0 3px}
.cal-gantt-bar.continues-both{border-left:none;border-radius:0}
.cal-milestone-dot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;border:2px solid var(--bg)}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.cal-legend-swatch{width:14px;height:10px;border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>Writing Center Hub — AY 2026–27</h1>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div class="who-group">
        <span class="who-label">Viewing as:</span>
        <button class="who-btn active-michelle" data-who="Michelle" onclick="setUser('Michelle')">Michelle</button>
        <button class="who-btn" data-who="Matthew" onclick="setUser('Matthew')">Matthew</button>
        <button class="who-btn" data-who="Carter" onclick="setUser('Carter')">Carter</button>
      </div>
      <div class="status-bar" id="status-bar">
        <div class="status-dot loading" id="status-dot"></div>
        <span id="status-text">Connecting…</span>
        <button onclick="refreshData()" title="Refresh" style="background:none;border:none;cursor:pointer;padding:0;margin-left:2px;color:var(--text3);font-size:15px;line-height:1" id="refresh-icon">↻</button>
      </div>
      <button class="btn btn-sm" id="undo-btn" onclick="undoDelete()" disabled style="opacity:.35;cursor:not-allowed">↩ Undo</button>
    </div>
  </div>

  <div style="background:var(--bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;border:1px solid var(--border);border-bottom:none">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('dashboard')">Dashboard</button>
      <button class="tab" onclick="switchTab('tasks')">Tasks</button>
      <button class="tab" onclick="switchTab('milestones')">Milestones</button>
      <button class="tab" onclick="switchTab('log')">Weekly log</button>
      <button class="tab" onclick="switchTab('calendar')">Calendar</button>
    </div>
  </div>

  <div id="panel-dashboard" class="panel active">
    <div class="metrics" id="metrics"></div>
    <div class="tl-wrap">
      <div class="tl-labels"><span>Aug 1, 2026</span><span>Today</span><span>May 31, 2027</span></div>
      <div class="tl-track"><div class="tl-fill" id="tl-fill" style="width:0%"></div></div>
    </div>
    <div class="section-head"><h2>Upcoming this week</h2></div>
    <div id="upcoming"></div>
    <hr class="divider">
    <div class="section-head"><h2>Recent activity</h2></div>
    <div id="recent-activity"></div>
  </div>

  <div id="panel-tasks" class="panel">
    <div class="section-head">
      <h2>Tasks</h2>
      <button class="btn btn-primary btn-sm" onclick="openTaskModal()">+ Add task</button>
    </div>
    <div class="filters">
      <div class="view-toggle">
        <button class="view-btn active" id="vb-month" onclick="setView('month')">By month</button>
        <button class="view-btn" id="vb-list" onclick="setView('list')">All tasks</button>
      </div>
      <select id="f-status" onchange="renderTasks()">
        <option value="">All statuses</option>
        <option value="In progress">In progress</option>
        <option value="Done">Done</option>
        <option value="Paused">Paused</option>
        <option value="Dropped">Dropped</option>
      </select>
      <select id="f-owner" onchange="renderTasks()">
        <option value="">All owners</option>
        <option value="Carter">Carter</option>
        <option value="Michelle">Michelle</option>
        <option value="Matthew">Matthew</option>
        <option value="All">All three</option>
      </select>
      <select id="f-cat" onchange="renderTasks()">
        <option value="">All categories</option>
        <option value="Operations">Operations</option>
        <option value="Programming">Programming</option>
        <option value="Development">Development</option>
      </select>
      <button class="btn btn-sm" id="mytasks-btn" onclick="toggleMyTasks()">◉ My tasks</button>
    </div>
    <div id="mytasks-bar" style="display:none" class="mytasks-bar">
      <span>Showing tasks for <strong id="mytasks-name"></strong></span>
      <button class="btn btn-sm" onclick="toggleMyTasks()">Clear</button>
    </div>
    <div id="task-list"></div>
  </div>

  <div id="panel-milestones" class="panel">
    <div class="section-head">
      <h2>Key milestones</h2>
      <button class="btn btn-primary btn-sm" onclick="openMsModal()">+ Add milestone</button>
    </div>
    <div id="ms-list"></div>
  </div>

  <div id="panel-log" class="panel">
    <div class="section-head">
      <div>
        <h2>Weekly log</h2>
        <p>Check-ins, supervision notes, hours.</p>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openLogModal()">+ Add entry</button>
    </div>
    <div id="log-list"></div>
  </div>

  <div id="panel-calendar" class="panel">
    <div class="section-head">
      <h2>Calendar</h2>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <button class="btn btn-sm" onclick="calNav(-1)">‹ Prev</button>
        <select id="cal-month-select" onchange="calJump()" style="font-size:12px;padding:5px 8px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-family:'Inter',sans-serif"></select>
        <button class="btn btn-sm" onclick="calNav(1)">Next ›</button>
        <button class="btn btn-sm" id="cal-priority-btn" onclick="toggleCalPriority()" style="border-color:#E8630A;color:#E8630A">Priority only</button>
      </div>
    </div>
    <div id="cal-legend" style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap"></div>
    <div id="cal-grid"></div>
    <div id="cal-nodate" style="margin-top:1.5rem"></div>
  </div>
</div>

<!-- Task modal -->
<div class="overlay" id="task-modal">
  <div class="modal">
    <h3 id="task-modal-title">Add task</h3>
    <div class="field"><label>Title</label><input type="text" id="t-title" placeholder="What needs doing?"></div>
    <div class="two-col">
      <div class="field"><label>Category</label>
        <select id="t-cat">
          <option value="Operations">Operations</option>
          <option value="Programming">Programming</option>
          <option value="Development">Development</option>
        </select>
      </div>
      <div class="field"><label>Owner</label>
        <select id="t-owner">
          <option value="Carter">Carter</option>
          <option value="Michelle">Michelle</option>
          <option value="Matthew">Matthew</option>
          <option value="All">All three</option>
        </select>
      </div>
    </div>
    <div class="two-col">
      <div class="field"><label>Status</label>
        <select id="t-status" onchange="toggleStartField()">
          <option value="">—</option>
          <option value="In progress">In progress</option>
          <option value="Done">Done</option>
          <option value="Paused">Paused</option>
          <option value="Dropped">Dropped</option>
        </select>
      </div>
      <div class="field"><label>Due date</label><input type="date" id="t-due"></div>
    </div>
    <div class="field" id="start-field" style="display:none"><label>Start date</label><input type="date" id="t-start"></div>
    <div class="field">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="t-priority" style="width:16px;height:16px;accent-color:#E8630A;cursor:pointer">
        <span>High priority</span>
      </label>
    </div>
    <div class="field"><label>Notes</label><textarea id="t-notes" placeholder="Context, sub-tasks, contacts, links…"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeTaskModal()">Cancel</button>
      <button class="btn btn-primary" id="task-save-btn" onclick="saveTask()">✓ Save task</button>
    </div>
  </div>
</div>

<!-- Milestone modal -->
<div class="overlay" id="ms-modal">
  <div class="modal">
    <h3 id="ms-modal-title">Add milestone</h3>
    <div class="field"><label>Milestone</label><input type="text" id="ms-title" placeholder="e.g. Fall tutor training complete"></div>
    <div class="field"><label>Date</label><input type="date" id="ms-date"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeMsModal()">Cancel</button>

function setStatus(state, msg) {
  document.getElementById('status-dot').className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = msg;
}

async function api(params) {
  const url = new URL(SCRIPT_URL);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, typeof v==='object'?JSON.stringify(v):v));
  const res = await fetch(url.toString(), {redirect:'follow'});
  return res.json();
}

async function loadData() {
  if (!SCRIPT_URL || SCRIPT_URL === 'YOUR_APPS_SCRIPT_DEPLOYMENT_URL_HERE') {
    setStatus('err', 'No script URL — using demo data');
    tasks = DEFAULT_TASKS; milestones = DEFAULT_MILESTONES; logs = [];
    renderAll(); return;
  }
  setStatus('loading', 'Loading…');
  try {
    const data = await api({action:'read'});
    if (data.error) throw new Error(data.error);
    tasks = (data.tasks && data.tasks.length ? data.tasks : DEFAULT_TASKS)
      .filter(t => t.deleted !== 'true' && !deletedIds.has(t.id));
    milestones = data.milestones && data.milestones.length ? data.milestones : DEFAULT_MILESTONES;
    logs = data.logs || [];
    connected = true;
    setStatus('ok', 'Connected — Google Sheets');
    renderAll();
  } catch(e) {
    setStatus('err', 'Could not connect — using demo data');
    tasks = DEFAULT_TASKS; milestones = DEFAULT_MILESTONES; logs = [];
    renderAll();
  }
}

function catBadge(c) {
  const m = {Operations:'b-operations',Programming:'b-programming',Development:'b-development'};
  return m[c] || 'b-operations';
}
function statusBadge(s) {
  const m = {'In progress':'b-inprog','Done':'b-done','Paused':'b-paused','Dropped':'b-dropped'};
  return m[s] || '';
}
function ownerBadge(o) {
  const m = {Michelle:'b-michelle',Matthew:'b-matthew',Carter:'b-carter'};
  return m[o] || 'b-all';
}
function dotClass(p) { return p==='High'?'dot-high':p==='Medium'?'dot-med':'dot-low'; }
function cleanDate(d) {
  // Normalize any date format to YYYY-MM-DD or return ''
  if (!d || d.trim() === '') return '';
  // Already in YYYY-MM-DD format
  if (/^\d{4}-\d{2}-\d{2}$/.test(d.trim())) return d.trim();
  // Google Sheets may return a full date string — parse and reformat
  const parsed = new Date(d);
  if (isNaN(parsed.getTime())) return '';
  const y = parsed.getFullYear();
  const m = String(parsed.getMonth()+1).padStart(2,'0');
  const day = String(parsed.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtDate(d) {
  const clean = cleanDate(d);
  if (!clean) return '';
  return new Date(clean+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
}
function dueClass(d) {
  const clean = cleanDate(d);
  if (!clean) return '';
  const diff = (new Date(clean+'T00:00:00')-new Date())/86400000;
  return diff<0?'overdue':diff<14?'soon':'';
}
function today() { return new Date().toISOString().slice(0,10); }

function isHighPriority(t) {
  return t.priority==='High' || t.priority===true || t.priority==='true';
}

function toggleStartField() {

function taskCard(t) {
  const dimmed = (t.status==='Done'||t.status==='Dropped') ? ' dimmed' : '';
  const hp = isHighPriority(t);
  const priorityTag = hp ? '<span class="priority-tag">High priority</span>' : '';

  // Start date only shown for certain statuses
  const showStart = ['In progress','Done','Paused','Dropped'].includes(t.status);
  const startStr = (showStart && cleanDate(t.start)) ? `<span class="date-chip"><span class="date-chip-label">Start</span>${fmtDate(t.start)}</span>` : '';
  const dueStr = cleanDate(t.due) ? `<span class="date-chip ${dueClass(t.due)}"><span class="date-chip-label">Due</span>${fmtDate(t.due)}</span>` : '';

  // Original due date — only show if different from current due
  const origDue = cleanDate(t.originalDue);
  const curDue = cleanDate(t.due);
  const origDueStr = (origDue && origDue !== curDue)
    ? `<span style="font-size:10px;color:var(--text3)">Originally due ${fmtDate(t.originalDue)}</span>`
    : '';

  return `<div class="card${dimmed}" id="tc-${t.id}">
    <div class="card-top">
      <div class="card-title">${t.title}</div>
      ${(startStr||dueStr) ? `<div class="card-date-group">${startStr}${dueStr}</div>` : ''}
    </div>
    <div class="card-meta">
      ${priorityTag}
      ${t.status ? `<span class="badge ${statusBadge(t.status)}">${t.status}</span>` : ''}
      <span class="badge ${ownerBadge(t.owner)}">${t.owner}</span>
      <span class="badge ${catBadge(t.cat)}">${t.cat}</span>
    </div>
    ${t.notes ? `<div class="card-notes">${t.notes}</div>` : ''}
    <div class="card-actions">
      <select onchange="updateStatus('${t.id}',this.value)" style="font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--border2)">
        <option value="">Change status…</option>
        <option value="In progress">In progress</option>
        <option value="Done">Done</option>
        <option value="Paused">Paused</option>
        <option value="Dropped">Dropped</option>
      </select>
      <button class="btn btn-sm" onclick="editTask('${t.id}')">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="deleteTask('${t.id}')">Delete</button>
      ${origDueStr ? `<span style="margin-left:auto">${origDueStr}</span>` : ''}
    </div>
  </div>`;
}

function applyFilters(list) {

}

  document.getElementById('metrics').innerHTML = `

  `;

    .sort((a,b)=>new Date(cleanDate(a.due)+'T00:00:00')-new Date(cleanDate(b.due)+'T00:00:00')).slice(0,6);
  document.getElementById('upcoming').innerHTML = upcoming.length

    ? recent.map(l=>`<div class="log-entry">
        <div class="log-header">

        </div>

    : '<div class="empty">No log entries yet.</div>';
}

function renderTasks() {
  const filtered = applyFilters(tasks);
  const sorted = [...filtered].sort((a,b)=>{
    // High priority first, then by due date
    const ap = (a.priority==='High'||a.priority===true||a.priority==='true') ? 0 : 1;
    const bp = (b.priority==='High'||b.priority===true||b.priority==='true') ? 0 : 1;
    if (ap !== bp) return ap - bp;
    return (new Date(cleanDate(a.due)||'9999')-new Date(cleanDate(b.due)||'9999'));
  });

  if (taskView==='list') {
    document.getElementById('task-list').innerHTML = sorted.length
      ? sorted.map(taskCard).join('')
      : '<div class="empty">No tasks match this filter.</div>';
    return;
  }

  const noDate = sorted.filter(t=>!cleanDate(t.due));
  const withDate = sorted.filter(t=>cleanDate(t.due));
  const groups = {};
  withDate.forEach(t=>{
    const d = new Date(cleanDate(t.due)+'T00:00:00');
    const key = d.getFullYear()+'-'+String(d.getMonth()).padStart(2,'0');
    const label = MONTHS[d.getMonth()]+' '+d.getFullYear();
    if (!groups[key]) groups[key]={label,tasks:[]};
    groups[key].tasks.push(t);
  });

  let html = '';
  Object.keys(groups).sort().forEach(k=>{
    const g = groups[k];
    const open = g.tasks.filter(t=>t.status!=='Done'&&t.status!=='Dropped').length;
    html += `<div class="month-group">
      <div class="month-header">${g.label} <span class="month-count">${open} open of ${g.tasks.length}</span></div>
      ${g.tasks.map(taskCard).join('')}
    </div>`;
  });
  if (noDate.length) {
    html += `<div class="month-group">
      <div class="month-header">No due date <span class="month-count">${noDate.length} tasks</span></div>
      ${noDate.map(taskCard).join('')}
    </div>`;
  }
  document.getElementById('task-list').innerHTML = html || '<div class="empty">No tasks match this filter.</div>';
}

// ── Calendar ──────────────────────────────────────────────
const AY_MONTHS = [
  {y:2026,m:5},{y:2026,m:6},{y:2026,m:7},{y:2026,m:8},{y:2026,m:9},
  {y:2026,m:10},{y:2026,m:11},{y:2026,m:12},
  {y:2027,m:0},{y:2027,m:1},{y:2027,m:2},{y:2027,m:3},{y:2027,m:4},{y:2027,m:5}
];
let calIdx = 3; // default to August 2026
let calPriorityOnly = true;

function buildCalMonthSelect() {
  const sel = document.getElementById('cal-month-select');
  if (!sel || sel.options.length > 0) return;
  AY_MONTHS.forEach((mo,i) => {
    const opt = document.createElement('option');

}

function toggleCalPriority() {

function calNav(dir) {

  document.getElementById('cal-month-select').value = calIdx;

function calJump() {

function ownerColor(o) {
  if (o==='Michelle') return 'owner-michelle';
  if (o==='Matthew')  return 'owner-matthew';
  if (o==='Carter')   return 'owner-carter';
  return 'owner-all';
}

function renderCalendar() {
  buildCalMonthSelect();
  const {y, m} = AY_MONTHS[calIdx];
  const todayStr = today();
  const firstDay = new Date(y, m, 1);
  const lastDate = new Date(y, m+1, 0).getDate();
  const monthStart = new Date(y, m, 1);
  const monthEnd   = new Date(y, m+1, 0, 23, 59, 59);

  // Filter tasks respecting myTasks and priority toggle
  let filtered = applyFilters(tasks).filter(t => t.status !== 'Dropped');
  if (calPriorityOnly) filtered = filtered.filter(t => isHighPriority(t));
  const inMonth = filtered.filter(t => {
    const s = cleanDate(t.start); const d = cleanDate(t.due);
    if (!s && !d) return false;
    const effectiveStart = new Date((s||d)+'T00:00:00');
    const effectiveEnd   = new Date((d||s)+'T00:00:00');
    return effectiveStart <= monthEnd && effectiveEnd >= monthStart;
  });
  const noDate = filtered.filter(t => !cleanDate(t.start) && !cleanDate(t.due));

  // Milestones in this month
  const msMo = milestones.filter(ms => {
    const d = new Date(ms.date+'T00:00:00');
    return d >= monthStart && d <= monthEnd;
  });

  // Build weeks array: each week is array of 7 {dateStr, dayNum, otherMonth}
  const weeks = [];
  let week = [];
  const startPad = firstDay.getDay(); // 0=Sun
  for (let i=0; i<startPad; i++) {
    const d = new Date(y, m, 1-startPad+i);
    week.push({dateStr: d.toISOString().slice(0,10), dayNum: d.getDate(), otherMonth: true});
  }
  for (let d=1; d<=lastDate; d++) {
    const dt = new Date(y, m, d);
    week.push({dateStr: `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`, dayNum: d, otherMonth: false});
    if (week.length === 7) { weeks.push(week); week = []; }
  }
  if (week.length > 0) {
    while (week.length < 7) {
      const last = new Date(week[week.length-1].dateStr+'T00:00:00');
      last.setDate(last.getDate()+1);
      week.push({dateStr: last.toISOString().slice(0,10), dayNum: last.getDate(), otherMonth: true});
    }
    weeks.push(week);
  }

  // For each task, assign a "lane" (row index) so bars don't overlap
  // Lane assignment per week
  function dateToIdx(dateStr, weekDays) {
    return weekDays.findIndex(wd => wd.dateStr === dateStr);
  }

  // Assign global lanes to tasks (consistent across weeks)
  const lanes = {};
  const sortedTasks = [...inMonth].sort((a,b) => {
    const as = cleanDate(a.start)||cleanDate(a.due)||'9999';
    const bs = cleanDate(b.start)||cleanDate(b.due)||'9999';
    return as.localeCompare(bs);
  });
  sortedTasks.forEach(t => {
    const taken = new Set(Object.values(lanes));
    const ts = cleanDate(t.start)||cleanDate(t.due);
    const te = cleanDate(t.due)||cleanDate(t.start);
    const usedLanes = new Set();
    sortedTasks.forEach(other => {
      if (other.id === t.id || lanes[other.id] === undefined) return;
      const os = cleanDate(other.start)||cleanDate(other.due);
      const oe = cleanDate(other.due)||cleanDate(other.start);
      if (ts <= oe && te >= os) usedLanes.add(lanes[other.id]);
    });
    let lane = 0;
    while (usedLanes.has(lane)) lane++;
    lanes[t.id] = lane;
  });

  const maxLane = Math.max(0, ...Object.values(lanes)) + 1;
  const BAR_H = 20; // px per lane
  const DAY_H = 22; // day number row height

  // Build HTML
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = `<div class="cal-wrap">`;
  html += `<div class="cal-header-row">`;
  DAYS.forEach(d => { html += `<div class="cal-header-cell">${d}</div>`; });
  html += `</div>`;

  weeks.forEach(weekDays => {
    const weekHeight = DAY_H + maxLane * BAR_H + 6;
    html += `<div class="cal-week-row" style="height:${weekHeight}px">`;

    // Day number cells (background grid)
    weekDays.forEach(wd => {
      const isToday = wd.dateStr === todayStr;
      html += `<div class="cal-day-cell${wd.otherMonth?' other-month':''}">`;
      if (isToday) {
        html += `<div class="cal-day-num is-today">${wd.dayNum}</div>`;
      } else {
        html += `<div class="cal-day-num">${wd.dayNum}</div>`;
      }
      html += `</div>`;
    });

    // Bars layer — absolutely positioned over the week row
    html += `<div style="position:absolute;top:${DAY_H}px;left:0;right:0;bottom:0;pointer-events:none">`;

    const weekStartStr = weekDays[0].dateStr;
    const weekEndStr   = weekDays[6].dateStr;

    inMonth.forEach(t => {
      const ts = cleanDate(t.start)||cleanDate(t.due);
      const te = cleanDate(t.due)||cleanDate(t.start);
      if (!ts || !te) return;
      // Does this task touch this week?
      if (ts > weekEndStr || te < weekStartStr) return;

      const clampStart = ts < weekStartStr ? weekStartStr : ts;
      const clampEnd   = te > weekEndStr   ? weekEndStr   : te;

      const startCol = weekDays.findIndex(wd => wd.dateStr === clampStart);
      const endCol   = weekDays.findIndex(wd => wd.dateStr === clampEnd);
      if (startCol < 0 || endCol < 0) return;

      const colW = 100/7;
      const left = startCol * colW;
      const width = (endCol - startCol + 1) * colW;
      const lane = lanes[t.id] || 0;
      const top = lane * BAR_H;

      const continuesLeft  = ts < weekStartStr;
      const continuesRight = te > weekEndStr;
      let radiusClass = '';
      if (continuesLeft && continuesRight) radiusClass = 'continues-both';
      else if (continuesLeft)  radiusClass = 'continues-left';
      else if (continuesRight) radiusClass = 'continues-right';

      const showLabel = !continuesLeft; // only show title on first segment
      const label = showLabel ? (t.title.length > 28 ? t.title.slice(0,28)+'…' : t.title) : '';

      html += `<div class="cal-gantt-bar ${ownerColor(t.owner)} ${radiusClass}"
        style="position:absolute;left:calc(${left}% + 1px);width:calc(${width}% - 2px);top:${top}px"
        title="${t.title} (${t.owner}${t.due?' · Due '+fmtDate(t.due):''})">${label}</div>`;
    });

    // Milestone flags
    msMo.forEach(ms => {
      const idx = weekDays.findIndex(wd => wd.dateStr === ms.date);
      if (idx < 0) return;
      const colW = 100/7;
      const left = idx * colW + colW/2;
      html += `<div style="position:absolute;left:calc(${left}% - 8px);bottom:3px;font-size:14px;z-index:3;cursor:default;line-height:1" title="${ms.title}">🚩</div>`;
    });

    html += `</div>`; // bars layer
    html += `</div>`; // week row
  });

  html += `</div>`; // cal-wrap
  document.getElementById('cal-grid').innerHTML = html;

  // Legend
  const owners = [...new Set(inMonth.map(t=>t.owner))];
  const legendColors = {
    Michelle:['var(--michelle-light)','var(--michelle)'],
    Matthew:['var(--matthew-light)','var(--matthew)'],
    Carter:['var(--carter-light)','var(--carter)'],
    All:['var(--gray-light)','var(--gray)']
  };
  let legend = owners.map(o => {
    const c = legendColors[o] || legendColors['All'];
    return `<div class="cal-legend-item"><div class="cal-legend-swatch" style="background:${c[0]};border-left:3px solid ${c[1]}"></div>${o}</div>`;
  }).join('');
  if (msMo.length) legend += `<div class="cal-legend-item"><span style="font-size:13px">🚩</span>Milestone</div>`;
  document.getElementById('cal-legend').innerHTML = legend;

  // No-date tasks
  if (noDate.length) {
    document.getElementById('cal-nodate').innerHTML = `
      <div class="month-header" style="margin-top:1rem">Tasks with no dates <span class="month-count">${noDate.length}</span></div>
      ${noDate.map(t=>`<div class="card" style="margin-bottom:6px">
        <div class="card-top">
          <div class="dot ${dotClass(t.priority)}"></div>
          <div class="card-title">${t.title}</div>
        </div>
        <div class="card-meta">
          <span class="badge ${ownerBadge(t.owner)}">${t.owner}</span>
          <span class="badge ${catBadge(t.cat)}">${t.cat}</span>
        </div>
      </div>`).join('')}`;
  } else {
    document.getElementById('cal-nodate').innerHTML = '';
  }
}

function renderAll() { renderDashboard(); renderTasks(); renderMilestones(); renderLog(); renderCalendar(); }

async function updateStatus(id, val) {
  if (!val) return;
  const t = tasks.find(x=>x.id===id);
  if (!t) return;
  t.status = val;
  await pushTask(t);
  await pushLog({id:'l'+Date.now(),date:today(),type:'Note',text:`Marked "${t.title}" as ${val}`,addedBy:currentUser});
  renderAll();
}

let undoStack = null;

function setUndoBtn(enabled, label) {
  const btn = document.getElementById('undo-btn');
  btn.disabled = !enabled;
  btn.style.opacity = enabled ? '1' : '.35';
  btn.style.cursor = enabled ? 'pointer' : 'not-allowed';
  if (label) btn.textContent = '↩ ' + label;
  else btn.textContent = '↩ Undo';
}

function showToast(msg, type, item) {
  undoStack = {type, item};
  setUndoBtn(true, 'Undo');
}

async function undoDelete() {
  if (!undoStack) return;
  const {type, item} = undoStack;
  undoStack = null;
  setUndoBtn(false);
  if (type==='task') {
    const restored = {...item, deleted:'', deletedOn:''};
    deletedIds.delete(item.id); // un-mark locally
    tasks.push(restored);
    if (connected) await api({action:'saveTask', data:restored});
  } else if (type==='milestone') {
    milestones.push(item);
    if (connected) await api({action:'saveMilestone', data:item});
  } else if (type==='log') {
    logs.push(item);
    if (connected) await api({action:'saveLog', data:item});
  }
  renderAll();
}

async function deleteTask(id) {
  const item = tasks.find(t=>t.id===id);
  if (!item) return;
  deletedIds.add(id);
  tasks = tasks.filter(t=>t.id!==id);
  if (connected) {
    const softDeleted = {...item, deleted:'true', deletedOn:today()};
    console.log('Soft deleting task:', softDeleted);
    try {
      const result = await api({action:'saveTask', data:softDeleted});
      console.log('Save result:', result);
    } catch(e) {
      console.error('Save error:', e);
    }
  } else {
    console.log('Not connected — delete is local only');
  }
  renderAll();
  if (item) showToast(`Deleted "${item.title.slice(0,40)}${item.title.length>40?'…':''}"`, 'task', item);
}
async function deleteMilestone(id) {
  const item = milestones.find(m=>m.id===id);
  milestones = milestones.filter(m=>m.id!==id);
  if (connected) await api({action:'deleteMilestone',id});
  renderMilestones();
  if (item) showToast(`Removed milestone "${item.title}"`, 'milestone', item);
}
async function deleteLog(id) {
  const item = logs.find(l=>l.id===id);
  logs = logs.filter(l=>l.id!==id);
  if (connected) await api({action:'deleteLog',id});
  renderLog(); renderDashboard();
  if (item) showToast('Log entry removed', 'log', item);
}

async function pushTask(t) { if (connected) await api({action:'saveTask',data:t}); }
async function pushLog(entry) {
  logs.push(entry);
  if (connected) await api({action:'saveLog',data:entry});
}

function openTaskModal(taskId) {
  editingTaskId = taskId || null;
  document.getElementById('task-modal-title').textContent = taskId ? 'Edit task' : 'Add task';
  if (taskId) {
    const t = tasks.find(x=>x.id===taskId);
    document.getElementById('t-title').value = t.title;
    document.getElementById('t-cat').value = t.cat || 'Operations';
    document.getElementById('t-owner').value = t.owner;
    document.getElementById('t-status').value = t.status;
    document.getElementById('t-start').value = cleanDate(t.start) || '';
    document.getElementById('t-due').value = cleanDate(t.due) || '';
    document.getElementById('t-priority').checked = isHighPriority(t);
    document.getElementById('t-notes').value = t.notes || '';
  } else {
    document.getElementById('t-title').value = '';
    document.getElementById('t-cat').value = 'Operations';
    document.getElementById('t-owner').value = 'Carter';
    document.getElementById('t-status').value = 'To do';
    document.getElementById('t-start').value = '';
    document.getElementById('t-due').value = '';
    document.getElementById('t-priority').checked = false;
    document.getElementById('t-notes').value = '';
  }
  toggleStartField();
  document.getElementById('task-modal').classList.add('open');
  document.getElementById('t-title').focus();
}
function editTask(id) { openTaskModal(id); }
function closeTaskModal() { document.getElementById('task-modal').classList.remove('open'); editingTaskId=null; }

async function saveTask() {
  const title = document.getElementById('t-title').value.trim();
  if (!title) { document.getElementById('t-title').focus(); return; }
  const btn = document.getElementById('task-save-btn');
  btn.innerHTML='<span class="spinner"></span> Saving…'; btn.disabled=true;
  const newDue = document.getElementById('t-due').value;
  // Preserve originalDue: set on first save, never overwrite
  let originalDue = '';
  if (editingTaskId) {
    const existing = tasks.find(x=>x.id===editingTaskId);
    if (existing) {
      const existingDue = cleanDate(existing.due);
      const existingOrigDue = cleanDate(existing.originalDue);
      if (existingOrigDue) {
        // Already has an original — keep it
        originalDue = existing.originalDue;
      } else if (existingDue && existingDue !== cleanDate(newDue)) {
        // Due date is being changed for first time — lock in the original
        originalDue = existing.due;
      }
    }
  }
  const t = {
    id: editingTaskId||'t'+Date.now(), title,
    cat:document.getElementById('t-cat').value,
    owner:document.getElementById('t-owner').value,
    priority: document.getElementById('t-priority').checked ? 'High' : '',
    status:document.getElementById('t-status').value,
    start:document.getElementById('t-start').value,
    due:newDue,
    originalDue,
    notes:document.getElementById('t-notes').value,
    added:today(), addedBy:currentUser
  };
  if (editingTaskId) {
    const idx = tasks.findIndex(x=>x.id===editingTaskId);
    if (idx>-1) tasks[idx]=t;
  } else {
    tasks.push(t);
    await pushLog({id:'l'+Date.now(),date:today(),type:'Note',text:`Added task: "${title}"`,addedBy:currentUser});
  }
  await pushTask(t);
  btn.innerHTML='✓ Save task'; btn.disabled=false;
  closeTaskModal(); renderAll();
}

let editingMsId = null;

function openMsModal() {
  editingMsId = null;
  document.getElementById('ms-modal-title').textContent = 'Add milestone';
  document.getElementById('ms-title').value='';
  document.getElementById('ms-date').value='';
  document.getElementById('ms-modal').classList.add('open');
  document.getElementById('ms-title').focus();
}
function editMilestone(id) {
  const m = milestones.find(x=>x.id===id);
  if (!m) return;
  editingMsId = id;
  document.getElementById('ms-modal-title').textContent = 'Edit milestone';
  document.getElementById('ms-title').value = m.title;
  document.getElementById('ms-date').value = m.date;
  document.getElementById('ms-modal').classList.add('open');
  document.getElementById('ms-title').focus();
}
function closeMsModal() { document.getElementById('ms-modal').classList.remove('open'); editingMsId=null; }
async function saveMilestone() {
  const title = document.getElementById('ms-title').value.trim();
  const date = document.getElementById('ms-date').value;
  if (!title||!date) return;
  if (editingMsId) {
    const m = milestones.find(x=>x.id===editingMsId);
    if (m) { m.title=title; m.date=date; }
    if (connected) await api({action:'saveMilestone', data:milestones.find(x=>x.id===editingMsId)});
  } else {
    const ms = {id:'m'+Date.now(), title, date};
    milestones.push(ms);
    if (connected) await api({action:'saveMilestone', data:ms});
  }
  closeMsModal(); renderMilestones();
}

function openLogModal() {
  document.getElementById('log-date').value=today();
  document.getElementById('log-text').value='';
  document.getElementById('log-modal').classList.add('open');
  document.getElementById('log-text').focus();
}
function closeLogModal() { document.getElementById('log-modal').classList.remove('open'); }
async function saveLog() {
  const text = document.getElementById('log-text').value.trim();
  if (!text) return;
  const entry = {id:'l'+Date.now(),date:document.getElementById('log-date').value,
    type:document.getElementById('log-type').value,text,addedBy:currentUser};
  await pushLog(entry);
  closeLogModal(); renderLog(); renderDashboard();
}

['task-modal','ms-modal','log-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

buildCalMonthSelect();
loadData();

// Auto-refresh every 30 seconds
setInterval(async () => {
  if (connected) {
    const data = await api({action:'read'});
    if (!data.error) {
      tasks = (data.tasks && data.tasks.length ? data.tasks : tasks)
        .filter(t => t.deleted !== 'true' && !deletedIds.has(t.id));
      milestones = data.milestones && data.milestones.length ? data.milestones : milestones;
      logs = data.logs || logs;
      renderAll();
    }
  }
}, 30000);
</script>
